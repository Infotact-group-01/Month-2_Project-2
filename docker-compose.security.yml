# Security Scanning Stack (Local)
# Usage: docker compose -f docker-compose.security.yml up --abort-on-container-exit --exit-code-from trivy-image

services:
  build-image:
    build:
      context: ./app
      dockerfile: Dockerfile
      target: production
    image: ecommerce-api:scan-target
    container_name: ecommerce-build
    entrypoint: ["echo", "Image built successfully"]

  trivy-sca:
    image: aquasec/trivy:latest
    container_name: trivy-sca
    depends_on:
      - build-image
    volumes:
      - ./app:/workspace:ro
      - ./reports:/reports
      - trivy-cache:/root/.cache/trivy
    command: >
      fs /workspace
      --exit-code 1
      --severity HIGH,CRITICAL
      --format sarif
      --output /reports/trivy-fs.sarif
      --ignore-unfixed
    networks:
      - security-net

  trivy-image:
    image: aquasec/trivy:latest
    container_name: trivy-image
    depends_on:
      - build-image
    volumes:
      - ./reports:/reports
      - trivy-cache:/root/.cache/trivy
      - /var/run/docker.sock:/var/run/docker.sock:ro
    command: >
      image ecommerce-api:scan-target
      --exit-code 1
      --severity HIGH,CRITICAL
      --format sarif
      --output /reports/trivy-image.sarif
      --ignore-unfixed
    networks:
      - security-net

  checkov:
    image: bridgecrew/checkov:latest
    container_name: checkov-scan
    volumes:
      - ./infrastructure:/infrastructure:ro
      - ./.checkov.yml:/.checkov.yml:ro
      - ./reports:/reports
    command: >
      -d /infrastructure/terraform
      --config-file /.checkov.yml
      --output cli
      --output sarif
      --output-file-path /reports/checkov
      --framework terraform
      --compact
    networks:
      - security-net

  semgrep:
    image: semgrep/semgrep:latest
    container_name: semgrep-sast
    volumes:
      - ./app/src:/src:ro
      - ./reports:/reports
    command: >
      semgrep scan
      --config=p/owasp-top-ten
      --config=p/nodejs
      --config=p/jwt
      --config=p/secrets
      --error
      --sarif
      --output /reports/semgrep.sarif
      /src
    networks:
      - security-net

  api-under-test:
    build:
      context: ./app
      dockerfile: Dockerfile
      target: production
    image: ecommerce-api:dast-target
    container_name: ecommerce-api-dast
    environment:
      NODE_ENV: production
      JWT_SECRET: local-dast-secret-change-before-production-12345
      CORS_ORIGIN: http://localhost:3000
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 10s
      timeout: 5s
      retries: 12
    networks:
      - security-net

  zap:
    image: ghcr.io/zaproxy/zaproxy:stable
    container_name: zap-dast
    depends_on:
      api-under-test:
        condition: service_healthy
    volumes:
      - ./reports:/zap/wrk
    command: >
      zap-baseline.py
      -t http://api-under-test:3000
      -J zap-report.json
      -r zap-report.html
      -x zap-report.xml
      -I
      -m 5
    networks:
      - security-net

volumes:
  trivy-cache:
    name: trivy-cache

networks:
  security-net:
    driver: bridge
    name: security-scan-network
