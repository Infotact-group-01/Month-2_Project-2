name: Enterprise DevSecOps Pipeline

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  actions: read

env:
  IMAGE_NAME: ecommerce-devsecops-api
  NODE_VERSION: "22"

jobs:
  app-quality:
    name: App Build, Lint, Test, Audit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm run test:ci

      - name: Dependency audit
        run: npm run audit:ci

      - name: Upload test and coverage reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: app-test-reports
          path: |
            app/coverage/
            app/test-results/
          if-no-files-found: ignore

  sast:
    name: SAST
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare reports
        run: mkdir -p reports

      - name: Semgrep OWASP and Node.js scan
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/src" \
            semgrep/semgrep:latest \
            semgrep scan \
              --config=p/owasp-top-ten \
              --config=p/nodejs \
              --config=p/jwt \
              --config=p/secrets \
              --error \
              --sarif \
              --output=/src/reports/semgrep.sarif \
              /src/app/src

      - name: Upload Semgrep SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: reports/semgrep.sarif
          category: semgrep

      - name: Optional SonarQube scan
        if: ${{ secrets.SONAR_TOKEN != '' }}
        uses: SonarSource/sonarqube-scan-action@v5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        with:
          args: >
            -Dsonar.projectKey=${{ secrets.SONAR_PROJECT_KEY }}
            -Dsonar.sources=app/src
            -Dsonar.tests=app/tests
            -Dsonar.javascript.lcov.reportPaths=app/coverage/lcov.info

  iac-security:
    name: IaC Security
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Terraform format check
        uses: hashicorp/setup-terraform@v3

      - name: Terraform fmt
        run: terraform -chdir=infrastructure/terraform fmt -check -recursive

      - name: Terraform init
        run: terraform -chdir=infrastructure/terraform init -backend=false

      - name: Terraform validate
        run: terraform -chdir=infrastructure/terraform validate

      - name: Prepare reports
        run: mkdir -p reports

      - name: Checkov Terraform scan
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/workspace" \
            bridgecrew/checkov:latest \
            -d /workspace/infrastructure/terraform \
            --config-file /workspace/.checkov.yml \
            --output cli \
            --output sarif \
            --output-file-path /workspace/reports/checkov

      - name: Upload Checkov report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: checkov-report
          path: reports/checkov*
          if-no-files-found: ignore

  container-security:
    name: SCA and Container Security
    runs-on: ubuntu-latest
    needs:
      - app-quality
      - sast
      - iac-security

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare reports
        run: mkdir -p reports

      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: fs
          scan-ref: app
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "1"
          format: sarif
          output: reports/trivy-fs.sarif

      - name: Upload Trivy filesystem SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: reports/trivy-fs.sarif
          category: trivy-filesystem

      - name: Build Docker image
        run: docker build --target production -t $IMAGE_NAME:${{ github.sha }} ./app

      - name: Trivy image scan
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: ${{ env.IMAGE_NAME }}:${{ github.sha }}
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "1"
          format: sarif
          output: reports/trivy-image.sarif

      - name: Upload Trivy image SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: reports/trivy-image.sarif
          category: trivy-image

  dast:
    name: OWASP ZAP DAST
    runs-on: ubuntu-latest
    needs: container-security

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build image for DAST
        run: docker build --target production -t $IMAGE_NAME:dast ./app

      - name: Start application
        run: |
          docker network create zap-net
          docker run -d \
            --name ecommerce-api \
            --network zap-net \
            -e NODE_ENV=production \
            -e JWT_SECRET=${{ secrets.CI_DAST_JWT_SECRET }} \
            -e CORS_ORIGIN=http://localhost:3000 \
            $IMAGE_NAME:dast

          for i in {1..30}; do
            if docker run --rm --network zap-net curlimages/curl:8.10.1 -fsS http://ecommerce-api:3000/health; then
              exit 0
            fi
            sleep 2
          done

          docker logs ecommerce-api
          exit 1

      - name: Run ZAP baseline scan
        run: |
          mkdir -p reports
          docker run --rm \
            --network zap-net \
            -v "${{ github.workspace }}/reports:/zap/wrk" \
            ghcr.io/zaproxy/zaproxy:stable \
            zap-baseline.py \
              -t http://ecommerce-api:3000 \
              -J zap-report.json \
              -r zap-report.html \
              -x zap-report.xml \
              -I \
              -m 5

          HIGH_ALERTS=$(jq '[.site[].alerts[]? | select(.riskdesc | test("^High"))] | length' reports/zap-report.json)
          if [ "$HIGH_ALERTS" -gt 0 ]; then
            echo "OWASP ZAP found $HIGH_ALERTS high-risk alerts."
            exit 1
          fi

      - name: Upload ZAP report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: zap-dast-report
          path: |
            reports/zap-report.json
            reports/zap-report.html
            reports/zap-report.xml
          if-no-files-found: ignore

      - name: Stop application
        if: always()
        run: docker rm -f ecommerce-api || true

  notify-on-failure:
    name: Send Security Alert Email
    runs-on: ubuntu-latest
    needs:
      - app-quality
      - sast
      - iac-security
      - container-security
      - dast
    if: failure()
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install alert service dependencies
        working-directory: app
        run: npm ci --omit=dev

      - name: Send failure alert email
        working-directory: app
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          ALERT_EMAIL_RECIPIENTS: ${{ secrets.ALERT_EMAIL_RECIPIENTS }}
          PIPELINE_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: node services/alertService.js
