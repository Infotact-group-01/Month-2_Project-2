

# ─── E-Commerce DevSecOps — Local Development Stack ──────────────────────────
# Usage: docker-compose up -d
# App:   http://localhost:3000
# Health: http://localhost:3000/health

services:

  # ── Application ─────────────────────────────────────────────────────────────
  api:
    build:
      context: ./app
      dockerfile: Dockerfile
      target: production
    container_name: ecommerce-api
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: development
      PORT: 3000
      HOST: 0.0.0.0
      LOG_LEVEL: info
      JWT_SECRET: ${JWT_SECRET:-local-dev-secret-change-me}
      JWT_EXPIRES_IN: 24h
      RATE_LIMIT_MAX: 1000
      CORS_ORIGIN: "*"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - ecommerce-net
    labels:
      - "traefik.enable=false"
      - "com.project=ecommerce-devsecops"

  # ── Nginx Reverse Proxy ──────────────────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: ecommerce-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf/default.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD","curl","-f","http://localhost:80/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    networks:
      - ecommerce-net

networks:
  ecommerce-net:
    driver: bridge
    name: ecommerce-network
